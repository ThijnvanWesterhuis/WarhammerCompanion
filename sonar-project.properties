sonar.projectKey=warhammer-companion
sonar.projectName=Warhammer Companion
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Backend and frontend source code
sonar.sources=backend/src/main/java,backend/src/main/resources,frontend/src

# Test files
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=backend/src/test/**/*.java,frontend/src/**/*.spec.ts

# Java compiled output
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info,frontend/coverage/lcov.info

# Ignore generated folders
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/.git/**,**/.idea/**

# Do not count these files against coverage
sonar.coverage.exclusions=**/*Application.java,**/config/**,**/*Dto.java,**/*.html,**/*.css,frontend/src/main.ts,frontend/src/environments/**

# Wait for the Quality Gate result
sonar.qualitygate.wait=true