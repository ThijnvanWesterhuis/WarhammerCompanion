<div class="page">
  <div class="card auth-card">
    <div class="panel-heading">
      <div>
        <span class="eyebrow">Secure Access</span>
        <h2>Authenticate</h2>
      </div>
      <span class="status-tag">Login</span>
    </div>

    <div class="auth-tabs">
      <span class="auth-tab active">Authenticate</span>
      <a class="auth-tab" routerLink="/register">Register</a>
    </div>

    @if (errorMessage()) {
      <p class="error-box">{{ errorMessage() }}</p>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Operator ID</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="ENTER_USERNAME"
          required
          [(ngModel)]="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Security Cipher</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="ENTER_CIPHER_KEY"
          required
          [(ngModel)]="password"
        />
      </div>

      <div class="form-actions">
        <button type="submit">Engage Link</button>
        <a routerLink="/register" class="button secondary">Create Account</a>
      </div>
    </form>
  </div>
</div>
