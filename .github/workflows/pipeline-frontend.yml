name: WH Frontend API Pipeline

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - docker/frontend/**
      - 'docker-compose.yml'
      - 'docker-compose.staging.yml'
      - '.env.staging'
      - .github/workflows/*-frontend.yml

  pull_request:
    paths:
      - frontend/**
      - docker/frontend/**
      - 'docker-compose.yml'
      - 'docker-compose.staging.yml'
      - '.env.staging'
      - .github/workflows/*-frontend.yml

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  unit-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --watch=false

  build-image:
    name: Build FE Docker image
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend to Dockerhub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/warhammercompanion-web:latest