services:
  postgres:
    image: postgres:16
    container_name: warhammer-postgres-staging
    environment:
      POSTGRES_DB: warhammercompanion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warhammercompanion"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: thijnvanwesterhuis/warhammercompanion-api:latest
    container_name: warhammer-api-staging
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/warhammercompanion
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
    depends_on:
      postgres:
          condition: service_healthy
    ports:
      - "8080:8080"

  web:
    image: thijnvanwesterhuis/warhammercompanion-web:latest
    container_name: warhammer-web-staging
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data_staging:
